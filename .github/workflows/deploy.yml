name: Deploy on Content Change

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'
      - 'media/**'

jobs:
  trigger-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Rebuild
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
